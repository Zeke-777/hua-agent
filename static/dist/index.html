<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>花卉研究 Agent</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --bg: #f5f5f5;
  --surface: #fff;
  --border: #e0e0e0;
  --text: #333;
  --text-secondary: #888;
  --primary: #4a7c59;
  --primary-hover: #3a6347;
  --danger: #c0392b;
  --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

/* Auth */
#auth-panel { display: flex; align-items: center; justify-content: center; height: 100vh; }
.auth-card { background: var(--surface); padding: 32px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); width: 360px; }
.auth-card h1 { font-size: 20px; margin-bottom: 20px; text-align: center; color: var(--primary); }
.auth-card input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; margin-bottom: 12px; }
.auth-card input:focus { outline: none; border-color: var(--primary); }
.auth-card button { width: 100%; padding: 10px; border: none; border-radius: var(--radius); font-size: 14px; cursor: pointer; margin-top: 4px; }
.auth-card button.primary { background: var(--primary); color: #fff; }
.auth-card button.primary:hover { background: var(--primary-hover); }
.auth-card button.link { background: none; color: var(--primary); font-size: 13px; margin-top: 8px; }
.auth-card .error { color: var(--danger); font-size: 13px; margin-bottom: 12px; }
.auth-card .success { color: var(--primary); font-size: 13px; margin-bottom: 12px; }

/* Main layout */
#main-panel { display: none; height: 100vh; }
#sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; }
#sidebar .header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
#sidebar .header .user { font-weight: 600; font-size: 14px; }
#sidebar .header button { background: none; border: 1px solid var(--border); border-radius: var(--radius); padding: 4px 10px; font-size: 12px; cursor: pointer; color: var(--text-secondary); }
#sidebar .header button:hover { color: var(--danger); border-color: var(--danger); }
#sidebar .session-list { flex: 1; overflow-y: auto; padding: 8px; }
#sidebar .session-item { padding: 10px 12px; border-radius: var(--radius); cursor: pointer; font-size: 14px; margin-bottom: 2px; display: flex; align-items: center; gap: 8px; }
#sidebar .session-item:hover { background: #f0f0f0; }
#sidebar .session-item.active { background: #e8f0eb; color: var(--primary); font-weight: 600; }
#sidebar .session-item .icon { font-size: 20px; }
#sidebar .new-btn { margin: 8px; padding: 8px; text-align: center; border: 1px dashed var(--border); border-radius: var(--radius); cursor: pointer; font-size: 13px; color: var(--text-secondary); }
#sidebar .new-btn:hover { border-color: var(--primary); color: var(--primary); }

#chat { margin-left: 260px; height: 100vh; display: flex; flex-direction: column; }

/* Welcome */
.welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
.welcome h2 { font-size: 24px; color: var(--primary); margin-bottom: 24px; }
.welcome .input-group { display: flex; gap: 8px; max-width: 400px; width: 100%; margin-bottom: 16px; }
.welcome input { flex: 1; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; }
.welcome input:focus { outline: none; border-color: var(--primary); }
.welcome button { padding: 10px 20px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius); font-size: 14px; cursor: pointer; }
.welcome button:hover { background: var(--primary-hover); }
.welcome button:disabled { opacity: 0.5; cursor: not-allowed; }
.welcome .upload-area { max-width: 400px; width: 100%; }
.welcome .upload-area label { display: block; padding: 24px; border: 2px dashed var(--border); border-radius: var(--radius); text-align: center; cursor: pointer; color: var(--text-secondary); font-size: 13px; }
.welcome .upload-area label:hover { border-color: var(--primary); color: var(--primary); }
.welcome .upload-area input[type=file] { display: none; }

/* Messages */
.messages { flex: 1; overflow-y: auto; padding: 20px 24px; }
.msg { max-width: 700px; margin-bottom: 16px; }
.msg.user { margin-left: auto; background: var(--primary); color: #fff; padding: 10px 16px; border-radius: 16px 16px 4px 16px; width: fit-content; max-width: 80%; }
.msg.ai { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; }
.msg.ai h1, .msg.ai h2, .msg.ai h3 { font-size: 16px; margin: 8px 0; }
.msg.ai p { margin: 6px 0; line-height: 1.6; }
.msg.ai ul, .msg.ai ol { margin: 6px 0; padding-left: 20px; }
.msg.ai li { margin: 3px 0; }
.msg.system { text-align: center; color: var(--text-secondary); font-size: 13px; padding: 8px; }
.msg.error { color: var(--danger); }

/* Flower card */
.flower-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; max-width: 700px; }
.flower-card h3 { font-size: 16px; color: var(--primary); margin-bottom: 12px; }
.flower-card .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; }
.flower-card .field { font-size: 13px; }
.flower-card .field .label { color: var(--text-secondary); }
.flower-card .field .value { color: var(--text); }
.flower-card .sources { margin-top: 12px; font-size: 12px; color: var(--text-secondary); }
.flower-card img { max-width: 200px; border-radius: var(--radius); margin-top: 8px; }

/* Input area */
.input-area { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 8px; background: var(--surface); }
.input-area input { flex: 1; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; }
.input-area input:focus { outline: none; border-color: var(--primary); }
.input-area button { padding: 10px 20px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius); font-size: 14px; cursor: pointer; }
.input-area button:hover { background: var(--primary-hover); }
.input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

/* Loading */
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #ccc; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-msg { display: flex; align-items: center; color: var(--text-secondary); font-size: 13px; padding: 8px 0; }
</style>
</head>
<body>

<!-- Auth panel -->
<div id="auth-panel">
  <div class="auth-card">
    <h1>花卉研究 Agent</h1>
    <div id="auth-error" class="error" style="display:none"></div>
    <input id="auth-username" type="text" placeholder="用户名" autocomplete="username">
    <input id="auth-password" type="password" placeholder="密码" autocomplete="current-password">
    <button class="primary" id="auth-submit">登录</button>
    <button class="link" id="auth-toggle">还没有账号？去注册</button>
  </div>
</div>

<!-- Main panel -->
<div id="main-panel">
  <div id="sidebar">
    <div class="header">
      <span class="user" id="sidebar-user"></span>
      <button id="logout-btn">退出</button>
    </div>
    <div class="session-list" id="session-list"></div>
    <div class="new-btn" id="new-session-btn">+ 新研究</div>
  </div>
  <div id="chat">
    <div class="welcome" id="welcome-screen">
      <h2>输入花卉名称，开始研究</h2>
      <div class="input-group">
        <input id="welcome-input" type="text" placeholder="例如：牡丹、玫瑰、菊花..." autofocus>
        <button id="welcome-btn">开始研究</button>
      </div>
      <div class="upload-area">
        <label for="file-input">或上传花卉图片（可选填花名）</label>
        <input id="file-input" type="file" accept="image/*">
        <div style="display:flex; gap:8px; max-width:400px; width:100%; margin-top:8px;" id="upload-name-group" hidden>
          <input id="upload-flower-name" type="text" placeholder="花卉名称（可选）" style="flex:1; padding: 8px 12px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 13px;">
          <button id="upload-btn" style="padding: 8px 16px; background: #4a7c59; color: #fff; border: none; border-radius: 8px; font-size: 13px; cursor: pointer;">上传研究</button>
        </div>
      </div>
    </div>
    <div class="messages" id="messages" style="display:none"></div>
    <div class="input-area" id="input-area" style="display:none">
      <input id="chat-input" type="text" placeholder="输入追问...">
      <button id="chat-send-btn">发送</button>
    </div>
  </div>
</div>

<script>
// ===========================================================================
// State
// ===========================================================================
const S = {
  mode: 'auth',        // 'auth' | 'welcome' | 'chat'
  isRegister: false,
  token: localStorage.getItem('token') || '',
  username: localStorage.getItem('username') || '',
  sessions: [],
  currentSessionId: null,
  messages: [],        // current session messages
  busy: false,
};

const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

// ===========================================================================
// API
// ===========================================================================
function headers(hasBody = true) {
  const h = { Authorization: `Bearer ${S.token}` };
  if (hasBody) h['Content-Type'] = 'application/json';
  return h;
}

async function api(method, path, body) {
  const opts = { method, headers: headers(!!body) };
  if (body) {
    opts.body = (body instanceof FormData) ? body : JSON.stringify(body);
    if (body instanceof FormData) delete opts.headers['Content-Type'];
  }
  const res = await fetch(path, opts);
  const data = await res.json();
  return { status: res.status, ...data };
}

async function loadSessions() {
  const r = await api('GET', '/api/sessions');
  if (r.ok) S.sessions = r.sessions;
  renderSidebar();
}

// ===========================================================================
// Render
// ===========================================================================
function render() {
  if (S.mode === 'auth') {
    $('#auth-panel').style.display = 'flex';
    $('#main-panel').style.display = 'none';
    $('#auth-error').style.display = 'none';
    $('#auth-submit').textContent = S.isRegister ? '注册' : '登录';
    $('#auth-toggle').textContent = S.isRegister ? '已有账号？去登录' : '还没有账号？去注册';
  } else {
    $('#auth-panel').style.display = 'none';
    $('#main-panel').style.display = 'flex';
    $('#sidebar-user').textContent = S.username;
    renderSidebar();

    if (S.currentSessionId) {
      $('#welcome-screen').style.display = 'none';
      $('#messages').style.display = '';
      $('#input-area').style.display = 'flex';
      renderMessages();
    } else {
      $('#welcome-screen').style.display = 'flex';
      $('#messages').style.display = 'none';
      $('#input-area').style.display = 'none';
      $('#welcome-input').value = '';
    }
  }
}

function renderSidebar() {
  const el = $('#session-list');
  el.innerHTML = S.sessions.map(s => `
    <div class="session-item${s.session_id === S.currentSessionId ? ' active' : ''}"
         data-sid="${s.session_id}" data-name="${s.name}">
      <span class="icon">${s.image_url ? '🖼' : '🌺'}</span>
      <span>${s.name}</span>
    </div>
  `).join('') || '<div style="padding:16px;text-align:center;color:#888;font-size:13px">暂无会话</div>';

  el.querySelectorAll('.session-item').forEach(item => {
    item.addEventListener('click', () => switchSession(item.dataset.sid));
  });
}

function renderMessages() {
  const el = $('#messages');
  el.innerHTML = S.messages.map(m => {
    if (m.type === 'user') return `<div class="msg user">${escHtml(m.content)}</div>`;
    if (m.type === 'flower_card') return renderFlowerCard(m.data);
    if (m.type === 'system') return `<div class="msg system${m.error ? ' error' : ''}">${m.content}</div>`;
    return `<div class="msg ai">${marked.parse(m.content, {breaks: true})}</div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function renderFlowerCard(d) {
  const fields = ['形态结构','植物分类','生长习性','花期规律','气味与特征','繁殖方式','使用价值','文化寓意'];
  const hasContent = fields.some(f => d[f] && d[f].trim());
  const grid = fields.map(f => {
    const val = hasContent ? (d[f] || '—') : '暂时搜索不到资料';
    return `<div class="field"><span class="label">${f}：</span><span class="value">${escHtml(val)}</span></div>`;
  }).join('');
  const sources = d['参考来源'] ? `<div class="sources">${escHtml(d['参考来源'])}</div>` : '';
  const img = d._image_url ? `<img src="${escHtml(d._image_url)}" alt="${escHtml(d['名称'] || '')}">` : '';
  return `
    <div class="flower-card">
      <h3>${escHtml(d['名称'] || '')} — 研究报告</h3>
      ${img}
      <div class="grid">${grid}</div>
      ${sources}
    </div>
  `;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ===========================================================================
// Actions
// ===========================================================================

// Auth
async function handleAuth() {
  const username = $('#auth-username').value.trim();
  const password = $('#auth-password').value.trim();
  if (!username || !password) {
    showAuthError('请填写用户名和密码');
    return;
  }
  setBusy(true);
  const path = S.isRegister ? '/api/auth/register' : '/api/auth/login';
  const r = await api('POST', path, { username, password });

  if (S.isRegister && r.ok) {
    $('#auth-error').style.display = 'block';
    $('#auth-error').className = 'success';
    $('#auth-error').textContent = r.message || '注册成功，请登录';
    S.isRegister = false;
    render();
  } else if (!S.isRegister && r.ok) {
    S.token = r.token;
    S.username = r.username;
    localStorage.setItem('token', S.token);
    localStorage.setItem('username', S.username);
    S.mode = 'welcome';
    S.currentSessionId = null;
    S.messages = [];
    await loadSessions();
    render();
  } else {
    showAuthError(r.detail || '操作失败');
  }
  setBusy(false);
}

function showAuthError(msg) {
  const el = $('#auth-error');
  el.style.display = 'block';
  el.className = 'error';
  el.textContent = msg;
}

async function handleLogout() {
  await api('POST', '/api/auth/logout');
  localStorage.removeItem('token');
  localStorage.removeItem('username');
  S.token = '';
  S.username = '';
  S.mode = 'auth';
  S.isRegister = false;
  S.sessions = [];
  S.currentSessionId = null;
  S.messages = [];
  render();
}

// Research
async function handleResearch(flowerName) {
  if (S.busy || !flowerName.trim()) return;
  setBusy(true);

  const flower_name = flowerName.trim();
  S.messages = [{ type: 'user', content: flower_name }];
  S.currentSessionId = null;
  renderMessages();
  $('#welcome-screen').style.display = 'none';
  $('#messages').style.display = '';
  $('#input-area').style.display = 'none';

  const r = await api('POST', '/api/research', { flower_name });
  if (r.ok) {
    S.currentSessionId = r.session_id;
    if (r.flower_info) {
      r.flower_info._image_url = r.image_url;
      S.messages.push({ type: 'flower_card', data: r.flower_info });
    }
    if (r.stage === 1) {
      S.messages.push({ type: 'ai', content: '以上是自动生成的' + flower_name + '研究报告。你可以继续追问任何问题。' });
    }
    await loadSessions();
    $('#input-area').style.display = 'flex';
  } else {
    S.messages.push({ type: 'system', content: r.detail || '研究失败', error: true });
    S.currentSessionId = null;
  }
  render();
  setBusy(false);
}

// Chat
async function handleChat(message) {
  if (S.busy || !message.trim() || !S.currentSessionId) return;
  setBusy(true);
  S.messages.push({ type: 'user', content: message.trim() });
  render();

  const r = await api('POST', '/api/chat', { message: message.trim() });
  if (r.ok) {
    S.messages.push({ type: 'ai', content: r.reply });
  } else {
    S.messages.push({ type: 'system', content: r.detail || '聊天失败', error: true });
  }
  render();
  setBusy(false);
}

// Upload
async function handleUpload(file, flowerName) {
  if (S.busy || !file) return;
  setBusy(true);

  S.messages = [{ type: 'system', content: '正在上传图片并识别花卉...' }];
  S.currentSessionId = null;
  renderMessages();
  $('#welcome-screen').style.display = 'none';
  $('#messages').style.display = '';
  $('#input-area').style.display = 'none';

  const form = new FormData();
  form.append('file', file);
  if (flowerName.trim()) form.append('flower_name', flowerName.trim());

  const r = await api('POST', '/api/upload', form);
  if (r.ok) {
    S.currentSessionId = r.session_id;
    S.messages = [];
    if (r.flower_info) {
      r.flower_info._image_url = r.image_url;
      S.messages.push({ type: 'flower_card', data: r.flower_info });
    }
    S.messages.push({ type: 'ai', content: '以上是基于图片生成的' + (r.flower_name || '花卉') + '研究报告。你可以继续追问任何问题。' });
    await loadSessions();
    $('#input-area').style.display = 'flex';
  } else {
    S.messages.push({ type: 'system', content: r.detail || '上传失败', error: true });
    S.currentSessionId = null;
  }
  render();
  setBusy(false);
}

// Session switching
async function switchSession(sid) {
  if (S.busy || sid === S.currentSessionId) return;
  setBusy(true);
  S.currentSessionId = sid;

  // Load cached flower_info from session list
  const session = S.sessions.find(s => s.session_id === sid);
  S.messages = [];
  if (session && session.flower_info) {
    session.flower_info._image_url = session.image_url;
    S.messages.push({ type: 'flower_card', data: session.flower_info });
    S.messages.push({ type: 'system', content: '已切换到会话：' + session.name });
  } else {
    S.messages.push({ type: 'system', content: '已切换到会话：' + (session ? session.name : sid) });
  }
  render();
  setBusy(false);
}

// New session
function newSession() {
  if (S.busy) return;
  S.currentSessionId = null;
  S.messages = [];
  render();
}

function setBusy(v) {
  S.busy = v;
  $$('button').forEach(b => { if (b.id !== 'logout-btn') b.disabled = v; });
  $$('input[type=text], input[type=password]').forEach(i => i.disabled = v);
}

// ===========================================================================
// Event bindings
// ===========================================================================
$('#auth-submit').addEventListener('click', handleAuth);
$('#auth-toggle').addEventListener('click', () => { S.isRegister = !S.isRegister; render(); });
$('#logout-btn').addEventListener('click', handleLogout);
$('#new-session-btn').addEventListener('click', newSession);

$('#welcome-btn').addEventListener('click', () => handleResearch($('#welcome-input').value));
$('#welcome-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') handleResearch($('#welcome-input').value); });

$('#chat-send-btn').addEventListener('click', () => {
  const input = $('#chat-input');
  handleChat(input.value);
  input.value = '';
});
$('#chat-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const input = $('#chat-input');
    handleChat(input.value);
    input.value = '';
  }
});

// Auth form enter key
$('#auth-username').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('#auth-password').focus(); });
$('#auth-password').addEventListener('keydown', (e) => { if (e.key === 'Enter') handleAuth(); });

// File upload
$('#file-input').addEventListener('change', () => {
  const file = $('#file-input').files[0];
  if (file) {
    $('#upload-name-group').hidden = false;
  }
});
$('#upload-btn').addEventListener('click', () => {
  const file = $('#file-input').files[0];
  if (file) {
    handleUpload(file, $('#upload-flower-name').value);
    $('#upload-name-group').hidden = true;
    $('#file-input').value = '';
    $('#upload-flower-name').value = '';
  }
});

// ===========================================================================
// Init
// ===========================================================================
if (S.token && S.username) {
  S.mode = 'welcome';
  loadSessions().then(() => render());
} else {
  render();
}
</script>
</body>
</html>
